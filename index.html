<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolão Copa do Mundo 2026 dos Figlios</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e1a;--card:#111827;--card2:#1a2744;--gold:#FFD700;--silver:#C0C0C0;
  --bronze:#CD7F32;--green:#00C851;--red:#FF3B3B;--white:#ffffff;
  --text-dim:#8892a4;--border:#1e2d4a;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--white);font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden}

/* ENTRY OVERLAY */
#entry-overlay{position:fixed;inset:0;background:radial-gradient(ellipse 140% 120% at 50% 55%,#0d1f40 0%,#050810 65%);z-index:1000;display:flex;align-items:center;justify-content:center;flex-direction:column;overflow-y:auto}
.entry-bg{position:absolute;inset:0;overflow:hidden}
.entry-bg canvas{position:absolute;inset:0;width:100%;height:100%}
.entry-content{position:relative;z-index:2;text-align:center;padding:2rem;max-width:600px;width:100%}
.entry-logo{font-family:'Barlow Condensed',sans-serif;font-size:clamp(2rem,6vw,3.5rem);font-weight:900;color:var(--gold);text-shadow:0 0 40px rgba(255,215,0,.4);line-height:1;margin-bottom:.5rem;letter-spacing:2px}
.entry-logo span{display:block;font-size:.5em;color:#fff;letter-spacing:6px;opacity:.8}
.entry-trophy{font-size:4rem;margin:1rem 0;filter:drop-shadow(0 0 20px var(--gold))}
.entry-card{background:rgba(26,39,68,.8);backdrop-filter:blur(10px);border:1px solid rgba(255,215,0,.2);border-radius:16px;padding:2rem;margin-top:1.5rem}
.entry-card h2{font-family:'Barlow Condensed',sans-serif;font-size:1.4rem;font-weight:700;margin-bottom:1.5rem;color:var(--gold)}
.entry-input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:8px;padding:.85rem 1rem;font-size:1rem;color:#fff;font-family:'Barlow',sans-serif;outline:none;transition:border-color .2s}
.entry-input:focus{border-color:var(--gold)}
.entry-input::placeholder{color:var(--text-dim)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;padding:.75rem 1.5rem;border:none;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;letter-spacing:1px;cursor:pointer;transition:all .2s;text-transform:uppercase}
.btn-gold{background:linear-gradient(135deg,#ffd700,#e6a200);color:#000;width:100%;margin-top:1rem;padding:1rem;font-size:1.1rem}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,215,0,.4)}
.btn-outline{background:transparent;border:1px solid var(--gold);color:var(--gold)}
.btn-outline:hover{background:rgba(255,215,0,.1)}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{background:#00a843}
.btn-red{background:var(--red);color:#fff}
.btn-red:hover{background:#e02d2d}
.btn-dim{background:rgba(255,255,255,.08);color:var(--text-dim)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.entry-actions{display:flex;flex-direction:column;gap:.75rem;margin-top:1rem}
.entry-actions .btn{width:100%;padding:.9rem}
.welcome-msg{font-size:1rem;color:var(--text-dim);margin-bottom:1rem;line-height:1.5}
.welcome-name{color:var(--gold);font-weight:600}

/* TROPHY SVG */
.trophy-wrap{margin:.5rem auto 1rem;display:flex;justify-content:center}
.trophy-svg{width:120px;height:auto;filter:drop-shadow(0 0 14px rgba(255,215,0,.65));animation:glowPulse 2.5s ease-in-out infinite alternate}
@keyframes glowPulse{from{filter:drop-shadow(0 0 8px rgba(255,215,0,.5)) drop-shadow(0 0 20px rgba(255,215,0,.2))}to{filter:drop-shadow(0 0 20px rgba(255,215,0,.95)) drop-shadow(0 0 50px rgba(255,215,0,.5))}}

/* PLAYER CARDS */
.players-strip{display:flex;gap:.65rem;justify-content:center;flex-wrap:wrap;margin:0 0 1.25rem}
.player-card{width:100px;background:linear-gradient(165deg,rgba(14,24,52,.97),rgba(8,13,30,.99));border:1px solid rgba(255,215,0,.32);border-radius:10px;overflow:hidden;transition:transform .2s,box-shadow .2s;cursor:default}
.player-card:hover{transform:translateY(-6px) scale(1.04);box-shadow:0 14px 32px rgba(255,215,0,.38),0 0 0 1px rgba(255,215,0,.65)}
.player-card-photo{width:100%;height:108px;object-fit:cover;object-position:center 5%;display:block}
.player-card-fallback{width:100%;height:108px;display:none;align-items:center;justify-content:center;font-size:2.2rem;background:rgba(255,215,0,.06)}
.player-card-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:.72rem;letter-spacing:.5px;color:#fff;text-transform:uppercase;display:block;padding:.35rem .25rem .05rem}
.player-card-sub{font-size:.78rem;color:var(--text-dim);display:block;padding:.05rem 0 .35rem}
.player-card-bar{height:2px;background:linear-gradient(90deg,transparent,#FFD700,transparent)}

/* HEADER */
#app{display:none;min-height:100vh}
#header{position:sticky;top:0;z-index:100;background:rgba(10,14,26,.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
.header-inner{max-width:1200px;margin:0 auto;padding:.75rem 1rem;display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap}
.header-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.4rem;color:var(--gold);white-space:nowrap;letter-spacing:1px}
.header-logo span{color:#fff;opacity:.7}
.tabs{display:flex;gap:.25rem;flex:1;justify-content:center}
.tab-btn{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.95rem;letter-spacing:1px;padding:.6rem 1.2rem;border:none;background:transparent;color:var(--text-dim);cursor:pointer;border-radius:6px;text-transform:uppercase;transition:all .2s;white-space:nowrap}
.tab-btn.active{background:rgba(255,215,0,.15);color:var(--gold)}
.tab-btn:hover:not(.active){color:#fff;background:rgba(255,255,255,.05)}
.user-badge{font-size:.85rem;color:var(--text-dim);white-space:nowrap;margin-left:auto}
.user-badge span{color:var(--gold);font-weight:600}

/* CONTENT */
#content{max-width:1200px;margin:0 auto;padding:1.5rem 1rem;padding-bottom:4rem}

/* PROGRESS BAR */
.progress-strip{display:flex;gap:.5rem;margin-bottom:2rem;background:var(--card);border-radius:12px;padding:.75rem;overflow-x:auto}
.progress-step{flex:1;min-width:100px;text-align:center;padding:.5rem .75rem;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:.8rem;font-weight:700;letter-spacing:.5px;color:var(--text-dim);background:rgba(255,255,255,.04);transition:all .3s;white-space:nowrap}
.progress-step.done{background:rgba(0,200,81,.15);color:var(--green);border:1px solid rgba(0,200,81,.3)}
.progress-step.active{background:rgba(255,215,0,.15);color:var(--gold);border:1px solid rgba(255,215,0,.3)}
.progress-step.locked{background:rgba(255,215,0,.2);color:var(--gold)}

/* SECTION HEADERS */
.section-header{margin:2rem 0 1rem;display:flex;align-items:center;gap:.75rem}
.section-title{font-family:'Barlow Condensed',sans-serif;font-size:1.6rem;font-weight:800;letter-spacing:1px;text-transform:uppercase}
.section-badge{background:rgba(255,215,0,.15);color:var(--gold);border:1px solid rgba(255,215,0,.3);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.8rem;padding:.25rem .6rem;border-radius:20px}
.section-counter{color:var(--text-dim);font-size:.9rem;margin-top:.25rem}

/* GROUP CARDS */
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem}
.group-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .2s}
.group-card.complete{border-color:rgba(0,200,81,.4)}
.group-card-header{background:var(--card2);padding:.6rem 1rem;display:flex;align-items:center;justify-content:space-between}
.group-letter{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.1rem;color:var(--gold)}
.group-check{color:var(--green);font-size:1rem}
.team-row{display:flex;align-items:center;gap:.5rem;padding:.5rem .75rem;border-bottom:1px solid rgba(255,255,255,.04)}
.team-row:last-child{border-bottom:none}
.team-flag{font-size:1.2rem;width:1.6rem;text-align:center}
.team-name{flex:1;font-size:.9rem;font-weight:500}
.pos-btns{display:flex;gap:.25rem}
.pos-btn{width:22px;height:22px;border-radius:50%;border:1px solid rgba(255,255,255,.15);background:transparent;color:var(--text-dim);font-size:.65rem;font-weight:700;cursor:pointer;transition:all .15s;font-family:'Barlow',sans-serif}
.pos-btn.p1.active{background:#FFD700;border-color:#FFD700;color:#000}
.pos-btn.p2.active{background:#C0C0C0;border-color:#C0C0C0;color:#000}
.pos-btn.p3.active{background:#CD7F32;border-color:#CD7F32;color:#fff}
.pos-btn.p4.active{background:#555;border-color:#888;color:#ccc}
.pos-btn:hover:not(.active){border-color:#fff;color:#fff}
.team-elim{opacity:.35;}

/* BEST THIRDS */
.thirds-section{background:var(--card);border-radius:12px;padding:1.5rem;margin-top:1.5rem}
.thirds-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.75rem;margin-top:1rem}
.third-card{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:.65rem .75rem;cursor:pointer;display:flex;align-items:center;gap:.5rem;transition:all .15s;font-size:.9rem}
.third-card.selected{background:rgba(205,127,50,.15);border-color:var(--bronze);color:#fff}
.third-card.selected .third-badge{background:var(--bronze);color:#fff}
.third-card.disabled{opacity:.4;cursor:not-allowed}
.third-badge{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;font-weight:700;padding:.15rem .35rem;border-radius:4px;background:rgba(255,255,255,.1);color:var(--text-dim);min-width:1.2rem;text-align:center}
.thirds-info{color:var(--text-dim);font-size:.85rem;margin-top:.75rem}
.thirds-note{background:rgba(255,215,0,.07);border:1px solid rgba(255,215,0,.2);border-radius:8px;padding:.85rem 1rem;font-size:.83rem;color:rgba(255,255,255,.75);line-height:1.55;margin:.75rem 0 1rem}

/* BRACKET */
.bracket-section{margin-top:1.5rem}
.bracket-rounds{display:grid;grid-template-columns:repeat(5,1fr);gap:1rem;overflow-x:auto}
@media(max-width:900px){.bracket-rounds{grid-template-columns:1fr}}
.bracket-col{display:flex;flex-direction:column;gap:.5rem}
.bracket-round-label{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:.85rem;letter-spacing:1px;color:var(--gold);text-align:center;padding:.4rem;text-transform:uppercase;background:rgba(255,215,0,.08);border-radius:6px;margin-bottom:.25rem}
.bracket-match{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:.5rem}
.bracket-match-label{font-family:'Barlow Condensed',sans-serif;font-size:.65rem;font-weight:700;color:var(--text-dim);letter-spacing:.5px;text-align:center;padding:.25rem .5rem;background:rgba(255,255,255,.03);border-bottom:1px solid rgba(255,255,255,.04)}
.bracket-match.locked{opacity:.7;pointer-events:none}
.bracket-team{display:flex;align-items:center;gap:.5rem;padding:.45rem .6rem;cursor:pointer;transition:background .15s;font-size:.85rem}
.bracket-team:first-of-type{border-bottom:1px solid rgba(255,255,255,.06)}
.bracket-team:hover{background:rgba(255,255,255,.06)}
.bracket-team.winner{background:rgba(0,200,81,.1);color:#fff}
.bracket-team.winner .bt-flag{filter:none}
.bracket-team.loser{opacity:.45}
.bracket-team .bt-flag{font-size:1rem;width:1.4rem;text-align:center}
.bracket-team .bt-name{flex:1;font-weight:500}
.bracket-team .bt-check{color:var(--green);font-size:.8rem}
.bracket-team.tbd{color:var(--text-dim);font-style:italic;cursor:default}
.bracket-team.tbd:hover{background:transparent}
.champion-card{background:linear-gradient(135deg,rgba(255,215,0,.15),rgba(255,215,0,.05));border:2px solid var(--gold);border-radius:12px;padding:1.5rem;text-align:center;margin-top:1rem}
.champion-trophy{font-size:3rem;filter:drop-shadow(0 0 15px var(--gold))}
.champion-label{font-family:'Barlow Condensed',sans-serif;font-size:.9rem;font-weight:700;color:var(--gold);letter-spacing:2px;margin:.5rem 0 .25rem}
.champion-name{font-family:'Barlow Condensed',sans-serif;font-size:1.8rem;font-weight:900}

/* TOP SCORER */
.scorer-section{background:var(--card);border-radius:12px;padding:1.5rem;margin-top:1.5rem}
.scorer-search{position:relative;margin-top:1rem}
.scorer-input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:8px;padding:.85rem 1rem;font-size:1rem;color:#fff;font-family:'Barlow',sans-serif;outline:none;transition:border-color .2s}
.scorer-input:focus{border-color:var(--gold)}
.scorer-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#1a2744;border:1px solid var(--border);border-radius:8px;max-height:220px;overflow-y:auto;z-index:50}
.scorer-option{display:flex;align-items:center;gap:.75rem;padding:.65rem 1rem;cursor:pointer;font-size:.9rem;transition:background .15s}
.scorer-option:hover{background:rgba(255,215,0,.1)}
.scorer-option .so-flag{font-size:1.1rem}
.scorer-option .so-team{font-size:.75rem;color:var(--text-dim)}
.scorer-selected{display:flex;align-items:center;gap:.75rem;margin-top:.75rem;padding:.75rem;background:rgba(0,200,81,.1);border:1px solid rgba(0,200,81,.3);border-radius:8px}
.scorer-selected .ss-pts{margin-left:auto;font-family:'Barlow Condensed',sans-serif;font-weight:700;color:var(--gold);font-size:.85rem}

/* FINALIZE */
.finalize-section{background:var(--card);border-radius:12px;padding:2rem;margin-top:2rem;text-align:center}
.finalize-checklist{text-align:left;margin:1.5rem 0;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.5rem}
.check-item{display:flex;align-items:center;gap:.5rem;font-size:.9rem;padding:.4rem}
.check-item.ok{color:var(--green)}
.check-item.missing{color:var(--red)}
.btn-lock{font-size:1.2rem;padding:1rem 2rem;width:100%;max-width:400px;background:linear-gradient(135deg,#ffd700,#e6a200);color:#000;border-radius:12px;border:none;font-family:'Barlow Condensed',sans-serif;font-weight:900;letter-spacing:2px;cursor:pointer;transition:all .2s;text-transform:uppercase}
.btn-lock:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 12px 32px rgba(255,215,0,.4)}
.btn-lock:disabled{opacity:.4;cursor:not-allowed;transform:none}
.missing-hint{color:var(--red);font-size:.85rem;margin-top:.5rem}
.locked-banner{background:rgba(0,200,81,.1);border:1px solid rgba(0,200,81,.3);border-radius:12px;padding:1.5rem;text-align:center}
.locked-banner h3{font-family:'Barlow Condensed',sans-serif;font-size:1.4rem;color:var(--green);margin-bottom:.5rem}
.code-display{background:rgba(0,0,0,.3);border-radius:8px;padding:1rem;margin:1rem auto;max-width:300px}
.code-value{font-family:'Barlow Condensed',sans-serif;font-size:2.5rem;font-weight:900;letter-spacing:8px;color:var(--gold)}
.code-label{font-size:.8rem;color:var(--text-dim);margin-bottom:.25rem}

/* RANKING */
.ranking-search{display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap}
.ranking-search input{flex:1;min-width:200px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:8px;padding:.7rem 1rem;font-size:.95rem;color:#fff;font-family:'Barlow',sans-serif;outline:none}
.ranking-search input:focus{border-color:var(--gold)}
.ranking-table{width:100%;border-collapse:collapse}
.ranking-table th{font-family:'Barlow Condensed',sans-serif;font-size:.8rem;font-weight:700;letter-spacing:1px;color:var(--text-dim);padding:.6rem .75rem;text-align:left;border-bottom:1px solid var(--border);text-transform:uppercase}
.ranking-table td{padding:.75rem;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
.rank-pos{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:800;width:40px;text-align:center}
.rank-name{font-weight:600}
.rank-code{font-size:.75rem;color:var(--text-dim)}
.rank-score{font-family:'Barlow Condensed',sans-serif;font-size:1.2rem;font-weight:800;color:var(--gold)}
.rank-max{font-size:.8rem;color:var(--text-dim)}
.rank-bar{height:4px;background:rgba(255,215,0,.2);border-radius:2px;margin-top:.25rem}
.rank-bar-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .5s}
.rank-expand{cursor:pointer;color:var(--text-dim);font-size:.8rem;padding:.25rem .5rem;background:rgba(255,255,255,.06);border:none;border-radius:4px;color:#fff}
.rank-expand:hover{background:rgba(255,255,255,.1)}
.rank-detail{display:none;background:rgba(255,255,255,.02);border-radius:8px;padding:1rem;margin:.25rem 0}
.rank-detail.open{display:block}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.5rem}
.detail-item{background:rgba(255,255,255,.04);border-radius:6px;padding:.5rem .75rem}
.detail-item .di-label{font-size:.7rem;color:var(--text-dim);margin-bottom:.15rem}
.detail-item .di-val{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:700;color:var(--gold)}
.empty-state{text-align:center;padding:4rem 2rem;color:var(--text-dim)}
.empty-state .es-icon{font-size:3rem;margin-bottom:1rem;display:block}
.empty-state h3{font-family:'Barlow Condensed',sans-serif;font-size:1.4rem;font-weight:700;color:#fff;margin-bottom:.5rem}

/* ADMIN */
.admin-panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-top:2rem}
.admin-section-title{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin:1.5rem 0 .75rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}
.admin-groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.75rem}
.admin-group{background:rgba(255,255,255,.04);border-radius:8px;padding:.75rem}
.admin-group label{font-family:'Barlow Condensed',sans-serif;font-size:.8rem;color:var(--text-dim);display:block;margin-bottom:.25rem}
.admin-select{width:100%;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:6px;padding:.45rem .5rem;color:#fff;font-family:'Barlow',sans-serif;font-size:.85rem;cursor:pointer;outline:none}
.admin-select:focus{border-color:var(--gold)}
.admin-bracket-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:.75rem}
.admin-match{background:rgba(255,255,255,.04);border-radius:8px;padding:.75rem}
.admin-match label{font-family:'Barlow Condensed',sans-serif;font-size:.8rem;color:var(--text-dim);display:block;margin-bottom:.25rem}
.admin-btn-row{display:flex;gap:.75rem;flex-wrap:wrap;margin-top:1.5rem}
.admin-footer{margin-top:3rem;text-align:center;padding-top:2rem;border-top:1px solid var(--border)}
.btn-admin-trigger{background:transparent;border:none;color:var(--text-dim);font-size:.8rem;cursor:pointer;padding:.5rem}
.btn-admin-trigger:hover{color:#fff}

/* RULES */
.rules-section{margin-bottom:2.5rem}
.rules-section h2{font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
.rules-card{background:var(--card);border-radius:12px;padding:1.5rem;border:1px solid var(--border)}
.rules-card p{color:rgba(255,255,255,.8);line-height:1.6;margin-bottom:.75rem}
.rules-card p:last-child{margin-bottom:0}
.points-table{width:100%;border-collapse:collapse}
.points-table td,.points-table th{padding:.65rem .75rem;border-bottom:1px solid rgba(255,255,255,.06);font-size:.9rem}
.points-table th{color:var(--text-dim);font-weight:600;font-size:.8rem}
.pts-val{font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;font-weight:800}
.example-row{display:flex;align-items:center;gap:1rem;padding:.75rem;border-radius:8px;margin:.5rem 0;font-size:.9rem}
.ex-green{background:rgba(0,200,81,.1);border:1px solid rgba(0,200,81,.3)}
.ex-red{background:rgba(255,59,59,.1);border:1px solid rgba(255,59,59,.3)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal-box{background:#111827;border:1px solid var(--border);border-radius:16px;padding:2rem;max-width:440px;width:100%;text-align:center}
.modal-box h3{font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;font-weight:800;margin-bottom:.75rem}
.modal-box p{color:rgba(255,255,255,.7);margin-bottom:1.5rem;line-height:1.5}
.modal-actions{display:flex;gap:.75rem;justify-content:center}

/* CONFETTI */
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:999}

/* TOAST */
#toast{position:fixed;bottom:2rem;right:1rem;background:#1a2744;border:1px solid var(--gold);border-radius:8px;padding:.75rem 1.25rem;font-size:.9rem;z-index:9999;transform:translateY(100px);opacity:0;transition:all .3s;max-width:300px}

/* LOCKED MODE */
.locked-mode .bracket-team,.locked-mode .third-card,.locked-mode .score-inp{pointer-events:none!important}

/* MATCH SCORE INPUTS */
.match-round-label{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;font-weight:700;color:var(--text-dim);letter-spacing:.5px;padding:.28rem .75rem;background:rgba(255,255,255,.025);text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,.04)}
.match-row{display:flex;align-items:center;gap:.4rem;padding:.38rem .6rem;border-bottom:1px solid rgba(255,255,255,.04)}
.match-row:last-of-type{border-bottom:none}
.match-team{flex:1;font-size:.78rem;font-weight:500;display:flex;align-items:center;gap:.3rem;min-width:0;overflow:hidden}
.match-team span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.match-team.away{justify-content:flex-end;text-align:right}
.match-score-wrap{display:flex;align-items:center;gap:.25rem;flex-shrink:0}
.score-inp{width:34px;height:30px;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:6px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:1.05rem;font-weight:700;text-align:center;padding:0;outline:none;transition:border-color .2s;-moz-appearance:textfield}
.score-inp::-webkit-outer-spin-button,.score-inp::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.score-inp:focus{border-color:var(--gold)}
.score-inp:disabled{opacity:.5;cursor:not-allowed}
.score-sep{color:var(--text-dim);font-weight:700;font-size:.85rem}
.group-standings{padding:.4rem .6rem;background:rgba(255,215,0,.04);border-top:1px solid rgba(255,215,0,.12)}
.standings-row{display:flex;align-items:center;gap:.4rem;padding:.18rem 0;font-size:.78rem}
.standings-pos{width:1.1rem;text-align:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;color:var(--text-dim);font-size:.8rem}
.standings-pos.p1{color:var(--gold)}.standings-pos.p2{color:var(--silver)}.standings-pos.p3{color:var(--bronze)}
.standings-team{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.standings-pts{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.85rem;width:2.2rem;text-align:right}
.standings-gd{font-size:.72rem;color:var(--text-dim);width:3.2rem;text-align:right}

@media(max-width:640px){
  .groups-grid{grid-template-columns:1fr}
  .header-inner{padding:.5rem .75rem;gap:.75rem}
  .header-logo{font-size:1.1rem}
  .tab-btn{font-size:.8rem;padding:.5rem .7rem}
  .bracket-rounds{display:flex;flex-direction:column}
  .ranking-table{font-size:.85rem}
  .modal-actions{flex-direction:column}
}
</style>
</head>

let fbDb = null;

function initFirebase(){
  try{
    if(!Object.values(FIREBASE_CONFIG).some(v=>v==='COLE_AQUI')){
      if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
      fbDb = firebase.database();
    }
  } catch(e){ console.warn('Firebase init:', e); }
}

async function fbSet(path, data){
  if(!fbDb) return;
  await fbDb.ref(path).set(data);
}

async function fbGet(path){
  if(!fbDb) return null;
  try{
    const snap = await fbDb.ref(path).once('value');
    return snap.val();
  } catch(e){ console.warn('fbGet:', e); return null; }
}

async function fbRemove(path){
  if(!fbDb) return;
  await fbDb.ref(path).remove();
}

async function fbSaveParticipant(p){
  await fbSet('bolao2026/participants/' + p.code, p);
}

async function fbLoadParticipants(){
  const data = await fbGet('bolao2026/participants');
  if(!data) return {};
  const out = {};
  Object.entries(data).forEach(([code, p]) => {
    if(!p) return;
    const name = p.name || p.code || code;
    if(name) { p.name = name; out[name] = p; }
  });
  return out;
}

    if(rr.bestThirds && rr.bestThirds.length) AppState.realResults.bestThirds = rr.bestThirds;
    if(rr.bracket) AppState.realResults.bracket = rr.bracket;
    if(rr.topScorer !== undefined) AppState.realResults.topScorer = rr.topScorer;
  }
  if(sc) Object.assign(AppState.scores, sc);
}

function generateCode(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let c='';
  for(let i=0;i<6;i++) c+=chars[Math.floor(Math.random()*chars.length)];
  return c;
}

function flag(team){return FLAGS[team]||'🏳️'}

function calcGroupStandings(gId, scores){
  const teams=GROUPS[gId].teams;
  const st={};
  teams.forEach(t=>{st[t]={team:t,pts:0,gd:0,gf:0,ga:0,w:0,d:0,l:0,played:0};});
  (GROUP_MATCHES[gId]||[]).forEach((pair,idx)=>{
    const sc=(scores||{})[`${gId}_${idx}`];
    if(!sc||sc.home===''||sc.home===null||sc.home===undefined||sc.away===''||sc.away===null||sc.away===undefined) return;
    const hg=parseInt(sc.home),ag=parseInt(sc.away);
    if(isNaN(hg)||isNaN(ag)) return;
    const [home,away]=pair;
    st[home].gf+=hg;st[home].ga+=ag;st[home].gd+=hg-ag;st[home].played++;
    st[away].gf+=ag;st[away].ga+=hg;st[away].gd+=ag-hg;st[away].played++;
    if(hg>ag){st[home].pts+=3;st[home].w++;st[away].l++;}
    else if(hg===ag){st[home].pts++;st[away].pts++;st[home].d++;st[away].d++;}
    else{st[away].pts+=3;st[away].w++;st[home].l++;}
  });
  return teams.map(t=>st[t]).sort((a,b)=>{
    if(b.pts!==a.pts) return b.pts-a.pts;
    if(b.gd!==a.gd) return b.gd-a.gd;
    if(b.gf!==a.gf) return b.gf-a.gf;
    return teams.indexOf(a.team)-teams.indexOf(b.team);
  });
}

function recalcGroupPositions(u){
  if(!u.matchScores) u.matchScores={};
  'ABCDEFGHIJKL'.split('').forEach(gId=>{
    const s=calcGroupStandings(gId,u.matchScores);
    if(!u.groups[gId]) u.groups[gId]={};
    u.groups[gId].first=s[0]?.team||null;
    u.groups[gId].second=s[1]?.team||null;
    u.groups[gId].third=s[2]?.team||null;
    u.groups[gId].fourth=s[3]?.team||null;
  });
  syncBestThirds(u);
}

function groupsComplete(u){
  if(!u.matchScores) return 0;
  let done=0;
  'ABCDEFGHIJKL'.split('').forEach(gId=>{
    const all=GROUP_MATCHES[gId].every((_,i)=>{
      const sc=u.matchScores[`${gId}_${i}`];
      return sc&&sc.home!==''&&sc.home!==null&&sc.home!==undefined&&sc.away!==''&&sc.away!==null&&sc.away!==undefined;
    });
    if(all) done++;
  });
  return done;
}

function syncBestThirds(u){
  if(groupsComplete(u)<12){u.bestThirds=[];return;}
  const thirds='ABCDEFGHIJKL'.split('').map(gId=>{
    const s=calcGroupStandings(gId,u.matchScores||{});
    return s.length>=3?{team:s[2].team,pts:s[2].pts,gd:s[2].gd,gf:s[2].gf,group:gId}:null;
  }).filter(Boolean);
  thirds.sort((a,b)=>{
    if(b.pts!==a.pts) return b.pts-a.pts;
    if(b.gd!==a.gd) return b.gd-a.gd;
    return b.gf-a.gf;
  });
  u.bestThirds=thirds.slice(0,8).map(t=>t.team);
}

function groupsDone(u){return groupsComplete(u)===12}

function bestThirdsDone(u){return u.bestThirds.length===8}

function bracketComplete(u){
  const b=u.bracket;
  return b.r32.every(x=>x) && b.r16.every(x=>x) && b.qf.every(x=>x) && b.sf.every(x=>x) && b.champion;
}

function allComplete(u){
  return groupsDone(u) && bracketComplete(u) && u.topScorer;
}

function getQualifyingGroups(u){
  if(groupsComplete(u)<12) return null;
  const thirds='ABCDEFGHIJKL'.split('').map(gId=>{
    const s=calcGroupStandings(gId,u.matchScores||{});
    return s.length>=3?{team:s[2].team,pts:s[2].pts,gd:s[2].gd,gf:s[2].gf,group:gId}:null;
  }).filter(Boolean);
  thirds.sort((a,b)=>{
    if(b.pts!==a.pts) return b.pts-a.pts;
    if(b.gd!==a.gd) return b.gd-a.gd;
    return b.gf-a.gf;
  });
  return thirds.slice(0,8).map(t=>t.group).sort().join('');
}

function getTeamForSource(src, u){
  if(!u) return null;
  const ms=u.matchScores||{};
  if(src.startsWith('1')){const s=calcGroupStandings(src[1],ms);return s[0]?.team||null;}
  if(src.startsWith('2')){const s=calcGroupStandings(src[1],ms);return s[1]?.team||null;}
  if(src.startsWith('3vs1')){
    const fg=src[4];
    const qKey=getQualifyingGroups(u);
    if(!qKey) return null;
    const combo=THIRD_COMBOS[qKey];
    if(!combo) return null;
    const idxMap={A:0,B:1,D:2,E:3,G:4,I:5,K:6,L:7};
    const idx=idxMap[fg];
    if(idx===undefined) return null;
    const thirdGroup=combo[idx][1];
    const s=calcGroupStandings(thirdGroup,ms);
    return s[2]?.team||null;
  }
  return null;
}

function getR32Teams(u){
  return R32_SOURCES.map(([a,b])=>[getTeamForSource(a,u),getTeamForSource(b,u)]);
}

function getMatchTeams(round, idx, u){
  if(round==='r32') return getR32Teams(u)[idx];
  if(round==='r16') return R16_FEEDS[idx].map(i=>u.bracket.r32[i]);
  if(round==='qf')  return QF_FEEDS[idx].map(i=>u.bracket.r16[i]);
  if(round==='sf')  return SF_FEEDS[idx].map(i=>u.bracket.qf[i]);
  if(round==='final') return u.bracket.sf;
  return [null,null];
}

function setBracketWinner(round, idx, winner, u){
  const old = round==='final'?u.bracket.champion:u.bracket[round][idx];
  if(round==='final') u.bracket.champion=winner;
  else u.bracket[round][idx]=winner;
  if(old!==winner) cascadeClear(round,idx,u);
}

function cascadeClear(round, idx, u){
  if(round==='r32'){
    const ri = R16_FEEDS.findIndex(f=>f.includes(idx));
    if(ri>=0){ u.bracket.r16[ri]=null; cascadeClear('r16',ri,u); }
  } else if(round==='r16'){
    const qi=QF_FEEDS.findIndex(f=>f.includes(idx));
    if(qi>=0){ u.bracket.qf[qi]=null; cascadeClear('qf',qi,u); }
  } else if(round==='qf'){
    const si=SF_FEEDS.findIndex(f=>f.includes(idx));
    if(si>=0){ u.bracket.sf[si]=null; cascadeClear('sf',si,u); }
  } else if(round==='sf'){
    u.bracket.champion=null;
  }
}

// ===================== SCORING =====================

function calculateScore(participant, realResults){
  let total=0;
  const bd={groups:0,bonus:0,r16:0,qf:0,sf:0,final:0,champion:0,topScorer:0};

  // Qualified from groups → +10 each correct
  const realQ=new Set();
  'ABCDEFGHIJKL'.split('').forEach(g=>{
    const r=realResults.groups[g];
    if(r){if(r.first)realQ.add(r.first);if(r.second)realQ.add(r.second);}
  });
  (realResults.bestThirds||[]).forEach(t=>realQ.add(t));

  const predQ=new Set();
  'ABCDEFGHIJKL'.split('').forEach(g=>{
    const p=participant.groups[g];
    if(p){if(p.first)predQ.add(p.first);if(p.second)predQ.add(p.second);}
  });
  (participant.bestThirds||[]).forEach(t=>predQ.add(t));

  realQ.forEach(t=>{if(predQ.has(t)){bd.groups+=10;total+=10;}});

  // Bonus: exact group position +5 (apenas 1º e 2º, pois participante não escolhe 3º/4º)
  'ABCDEFGHIJKL'.split('').forEach(g=>{
    const r=realResults.groups[g], p=participant.groups[g];
    if(!r||!p) return;
    ['first','second'].forEach(pos=>{
      if(r[pos]&&p[pos]===r[pos]){bd.bonus+=5;total+=5;}
    });
  });

  // Bracket rounds
  const rndPairs=[['r32','r16'],['r16','qf'],['qf','sf'],['sf','final']];
  rndPairs.forEach(([pKey,bdKey])=>{
    const pts=ROUND_PTS[bdKey]||50;
    const realW=new Set(realResults.bracket?.[pKey]||[]);
    (participant.bracket?.[pKey]||[]).forEach(t=>{
      if(t&&realW.has(t)){bd[bdKey]+=pts;total+=pts;}
    });
  });

  // Champion
  if(participant.bracket?.champion && participant.bracket.champion===realResults.bracket?.champion){
    bd.champion=60;total+=60;
  }

  // Artilheiro
  if(participant.topScorer && participant.topScorer===realResults.topScorer){
    bd.topScorer=25;total+=25;
  }

  return{total,bd};
}

function recalcAllScores(){
  Object.keys(AppState.participants).forEach(name=>{
    const p=AppState.participants[name];
    if(!p.matchScores) p.matchScores={};
    recalcGroupPositions(p);
    if(p.locked){
      AppState.scores[name]=calculateScore(p,AppState.realResults);
    }
  });
  saveState();
}

function initParticles(){
  const canvas=document.getElementById('particle-canvas');
  const ctx=canvas.getContext('2d');
  let W,H,particles=[];
  function resize(){W=canvas.width=canvas.offsetWidth;H=canvas.height=canvas.offsetHeight;}
  resize();
  window.addEventListener('resize',resize);
  for(let i=0;i<60;i++){
    particles.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*2+1,
      dx:(Math.random()-.5)*.4,dy:(Math.random()-.5)*.4,
      o:Math.random()*.5+.1});
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    particles.forEach(p=>{
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,215,0,${p.o})`;ctx.fill();
      p.x+=p.dx;p.y+=p.dy;
      if(p.x<0||p.x>W)p.dx*=-1;
      if(p.y<0||p.y>H)p.dy*=-1;
    });
    requestAnimationFrame(draw);
  }
  draw();
}

function launchConfetti(){
  const canvas=document.getElementById('confetti-canvas');
  canvas.style.display='block';
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const pieces=[];
  const colors=['#FFD700','#00C851','#ffffff','#FF6B6B','#4ECDC4'];
  for(let i=0;i<120;i++){
    pieces.push({x:Math.random()*canvas.width,y:-20,
      w:Math.random()*10+5,h:Math.random()*6+4,
      color:colors[Math.floor(Math.random()*colors.length)],
      angle:Math.random()*360,spin:Math.random()*6-3,
      dx:(Math.random()-.5)*4,dy:Math.random()*4+3,
      opacity:1});
  }
  let frame=0;
  function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let alive=false;
    pieces.forEach(p=>{
      p.y+=p.dy;p.x+=p.dx;p.angle+=p.spin;p.opacity-=0.008;
      if(p.opacity>0){alive=true;
        ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.angle*Math.PI/180);
        ctx.globalAlpha=p.opacity;ctx.fillStyle=p.color;
        ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();
      }
    });
    if(alive&&frame<300){frame++;requestAnimationFrame(animate);}
    else{canvas.style.display='none';}
  }
  animate();
}

      let sEl=document.getElementById(`standings-${group}`);
      if(hasAny){
        const html=newS.map((s,i)=>`<div class="standings-row"><span class="standings-pos ${i===0?'p1':i===1?'p2':i===2?'p3':''}">${i+1}</span><span class="standings-team">${flag(s.team)} ${s.team}</span><span class="standings-pts">${s.pts}p</span><span class="standings-gd">${s.gd>=0?'+':''}${s.gd} GD</span></div>`).join('');
        if(sEl){sEl.innerHTML=html;}
        else{const card=inp.closest('.group-card');if(card){const d=document.createElement('div');d.className='group-standings';d.id=`standings-${group}`;d.innerHTML=html;card.appendChild(d);}}
      }
      // Update group-card complete state
      const card=inp.closest('.group-card');
      const allDone=GROUP_MATCHES[group].every((_,i)=>{const sc=u2.matchScores[`${group}_${i}`];return sc&&sc.home!==''&&sc.home!==null&&sc.home!==undefined&&sc.away!==''&&sc.away!==null&&sc.away!==undefined;});
      if(card){
        card.classList.toggle('complete',allDone);
        const checkEl=card.querySelector('.group-check');
        if(allDone&&!checkEl) card.querySelector('.group-card-header').insertAdjacentHTML('beforeend','<span class="group-check">✅</span>');
        else if(!allDone&&checkEl) checkEl.remove();
      }

      updateProgress();
      const done2=groupsComplete(u2);
      if(done2===12){
        renderBestThirdsSection();
        renderBracketSection();
        renderScorerSection();
      } else {
        const bracketEl=document.getElementById('sim-bracket');
        if(bracketEl&&bracketEl.innerHTML){bracketEl.innerHTML='';document.getElementById('sim-thirds').innerHTML='';}
      }
      renderFinalizeSection();
    });
  });
}

function renderGroupCard(gId, u){
  const matches=GROUP_MATCHES[gId];
  const scores=u.matchScores||{};
  const allDone=matches.every((_,i)=>{const sc=scores[`${gId}_${i}`];return sc&&sc.home!==''&&sc.home!==null&&sc.home!==undefined&&sc.away!==''&&sc.away!==null&&sc.away!==undefined;});
  const standings=calcGroupStandings(gId,scores);
  const hasAny=matches.some((_,i)=>{const sc=scores[`${gId}_${i}`];return sc&&(sc.home!==''||sc.away!=='');});

  const rounds=[{label:'1ª Rodada',idx:[0,1]},{label:'2ª Rodada',idx:[2,3]},{label:'3ª Rodada',idx:[4,5]}];
  let body='';
  rounds.forEach(({label,idx})=>{
    body+=`<div class="match-round-label">${label}</div>`;
    idx.forEach(mi=>{
      const [home,away]=matches[mi];
      const sc=scores[`${gId}_${mi}`]||{home:'',away:''};
      const hv=sc.home!==''&&sc.home!==null&&sc.home!==undefined?sc.home:'';
      const av=sc.away!==''&&sc.away!==null&&sc.away!==undefined?sc.away:'';
      body+=`<div class="match-row">
        <div class="match-team">${flag(home)}<span>${home}</span></div>
        <div class="match-score-wrap">
          <input type="number" class="score-inp" min="0" max="30" placeholder="0" value="${hv}" data-group="${gId}" data-match="${mi}" data-side="home"${u.locked?' disabled':''}>
          <span class="score-sep">×</span>
          <input type="number" class="score-inp" min="0" max="30" placeholder="0" value="${av}" data-group="${gId}" data-match="${mi}" data-side="away"${u.locked?' disabled':''}>
        </div>
        <div class="match-team away"><span>${away}</span>${flag(away)}</div>
      </div>`;
    });
  });

  if(hasAny){
    body+=`<div class="group-standings" id="standings-${gId}">`;
    standings.forEach((s,i)=>{body+=`<div class="standings-row"><span class="standings-pos ${i===0?'p1':i===1?'p2':i===2?'p3':''}">${i+1}</span><span class="standings-team">${flag(s.team)} ${s.team}</span><span class="standings-pts">${s.pts}p</span><span class="standings-gd">${s.gd>=0?'+':''}${s.gd} GD</span></div>`;});
    body+=`</div>`;
  }

  return `<div class="group-card${allDone?' complete':''}">
    <div class="group-card-header">
      <span class="group-letter">Grupo ${gId}</span>
      ${allDone?'<span class="group-check">✅</span>':''}
    </div>
    ${body}
  </div>`;
}

function updateProgress(){
  const u=getUser();
  const strip=document.querySelector('.progress-strip');
  if(!strip) return;
  const gDone=groupsComplete(u);
  const bComp=bracketComplete(u);
  strip.querySelectorAll('.progress-step').forEach((el,i)=>{
    el.className='progress-step';
    if(i===0){if(gDone===12)el.classList.add('done');else if(gDone>0)el.classList.add('active');el.textContent=`GRUPOS ${gDone}/12 ${gDone===12?'✅':''}`;}
    if(i===1){if(bComp)el.classList.add('done');else if(gDone===12)el.classList.add('active');el.textContent=`${gDone<12?'🔒 ':''}MATA-MATA ${bComp?'✅':''}`;}
    if(i===2){if(u.topScorer)el.classList.add('done');el.textContent=`ARTILHEIRO ${u.topScorer?'✅':''}`;}
    if(i===3){if(u.locked)el.classList.add('locked');el.textContent=`SALVO ${u.locked?'✅':''}`;}
  });
}

// ===================== BRACKET =====================

function renderBracketSection(){
  const u=getUser();
  const el=document.getElementById('sim-bracket');
  if(!el) return;

  const rounds=[
    {key:'r32',label:'16avos de Final',matches:16,prev:null},
    {key:'r16',label:'Oitavas de Final',matches:8,prev:'r32'},
    {key:'qf',label:'Quartas de Final',matches:4,prev:'r16'},
    {key:'sf',label:'Semifinal',matches:2,prev:'qf'},
    {key:'final',label:'Final',matches:1,prev:'sf'}
  ];

  const champion=u.bracket.champion;

  let html=`
  <div class="section-header" style="margin-top:2rem">
    <div><div class="section-title">Mata-Mata</div></div>
    <div class="section-badge">${bracketComplete(u)?'✅ Completo':'Em andamento'}</div>
  </div>
  <div class="bracket-rounds">`;

  rounds.forEach(rnd=>{
    html+=`<div class="bracket-col"><div class="bracket-round-label">${rnd.label}</div>`;
    const count=rnd.key==='final'?1:rnd.matches;
    for(let i=0;i<count;i++){
      const teams=getMatchTeams(rnd.key,i,u);
      const winner=rnd.key==='final'?u.bracket.champion:u.bracket[rnd.key][i];
      const t0=teams[0], t1=teams[1];
      const locked=u.locked;
      const matchLabel=rnd.key==='r32'?R32_LABELS[i]:'';
      html+=`<div class="bracket-match${locked?' locked':''}">
        ${matchLabel?`<div class="bracket-match-label">M${73+i} · ${matchLabel}</div>`:''}
        ${renderBracketTeam(t0,winner,rnd.key,i,0,locked)}
        ${renderBracketTeam(t1,winner,rnd.key,i,1,locked)}
      </div>`;
    }
    html+=`</div>`;
  });

  html+=`</div>`;

  if(champion){
    html+=`<div class="champion-card">
      <div class="champion-trophy">🏆</div>
      <div class="champion-label">SEU CAMPEÃO</div>
      <div class="champion-name">${flag(champion)} ${champion}</div>
    </div>`;
  }

  el.innerHTML=html;

  if(!u.locked){
    el.querySelectorAll('.bracket-team:not(.tbd)').forEach(b=>{
      b.addEventListener('click',()=>{
        const {round,match,team}=b.dataset;
        if(!team||team==='?') return;
        const matchIdx=parseInt(match);
        const u2=getUser();
        const [t0,t1]=getMatchTeams(round,matchIdx,u2);
        if(team!==t0&&team!==t1) return;
        setBracketWinner(round,matchIdx,team,u2);
        saveState();
        updateProgress();
        renderBracketSection();
        renderFinalizeSection();
      });
    });
  }
}

function renderBracketTeam(team, winner, round, matchIdx, slot, locked){
  if(!team){
    return `<div class="bracket-team tbd" data-round="${round}" data-match="${matchIdx}" data-slot="${slot}" data-team="">
      <span class="bt-flag">🏳️</span><span class="bt-name">A definir</span>
    </div>`;
  }
  const isWinner=winner===team;
  const isLoser=winner&&winner!==team;
  return `<div class="bracket-team ${isWinner?'winner':''} ${isLoser?'loser':''}" data-round="${round}" data-match="${matchIdx}" data-slot="${slot}" data-team="${team}">
    <span class="bt-flag">${flag(team)}</span>
    <span class="bt-name">${team}</span>
    ${isWinner?'<span class="bt-check">✓</span>':''}
  </div>`;
}

function renderFinalizeSection(){
  const u=getUser();
  const el=document.getElementById('sim-finalize');
  if(!el) return;

  if(u.locked){
    const d=new Date(u.lockedAt);
    const fmt=d.toLocaleString('pt-BR');
    el.innerHTML=`
    <div class="finalize-section">
      <div class="locked-banner">
        <div style="font-size:2rem">🔒</div>
        <h3>Palpites Salvos!</h3>
        <p style="color:var(--text-dim);font-size:.9rem">Salvos em ${fmt}</p>
        <div class="code-display">
          <div class="code-label">Seu código do bolão</div>
          <div class="code-value">${u.code}</div>
        </div>
        <button class="btn btn-dim" id="copy-code" style="margin-top:.5rem">📋 Copiar Código</button>
        <p style="font-size:.8rem;color:var(--text-dim);margin-top:.75rem">Guarde este código para acompanhar seu palpite no ranking.</p>
      </div>
    </div>`;
    el.querySelector('#copy-code').addEventListener('click',()=>{
      navigator.clipboard?.writeText(u.code)||document.execCommand('copy');
      showToast('Código copiado: '+u.code);
    });
    return;
  }

  const gDone=groupsComplete(u);
  const bComp=bracketComplete(u);
  const scorer=!!u.topScorer;
  const checks=[
    {ok:gDone===12,label:`Grupos: ${gDone}/12 preenchidos`},
    {ok:bComp,label:`Mata-mata: ${bComp?'completo':'incompleto'}`},
    {ok:scorer,label:`Artilheiro: ${scorer?u.topScorer:'não escolhido'}`}
  ];
  const ready=checks.every(c=>c.ok);
  const missing=checks.filter(c=>!c.ok).map(c=>c.label);

  el.innerHTML=`
  <div class="finalize-section">
    <div style="font-size:2rem;margin-bottom:.75rem">🔒</div>
    <h2 style="font-family:'Barlow Condensed',sans-serif;font-size:1.4rem;font-weight:800;margin-bottom:.5rem">SALVAR E TRAVAR PALPITES</h2>
    <p style="color:var(--text-dim);font-size:.9rem;margin-bottom:1rem">Após salvar, seus palpites não poderão ser alterados.</p>
    <div class="finalize-checklist">
      ${checks.map(c=>`<div class="check-item ${c.ok?'ok':'missing'}">${c.ok?'✅':'❌'} ${c.label}</div>`).join('')}

    <button class="btn-lock" id="lock-btn" ${ready?'':'disabled'}>🔒 SALVAR E TRAVAR MEUS PALPITES</button>
    ${!ready?`<p class="missing-hint">Falta: ${missing.slice(0,2).join(', ')}${missing.length>2?'...':''}</p>`:''}
  </div>`;

  if(ready){
    el.querySelector('#lock-btn').addEventListener('click',()=>{
      showModal(
        '<h3 style="color:var(--gold)">⚠️ Confirmar Palpite</h3><p>Tem certeza? Após salvar, seus palpites <strong>não poderão</strong> ser alterados.</p>',
        lockPalpite,'✅ CONFIRMAR E SALVAR','← Voltar e Revisar'
      );
    });
  }
}

function lockPalpite(){
  const u=getUser();
  recalcGroupPositions(u);
  u.locked=true;
  u.lockedAt=new Date().toISOString();
  if(!u.name) u.name=AppState.currentUser;
  saveState();
  fbSaveParticipant(u).catch(e=>console.warn('fbSave:',e));
  launchConfetti();
  showToast('🏆 Palpites salvos! Boa sorte!');
  setTimeout(()=>{renderSimulator();},300);
}

        <select class="admin-select" data-group="${gId}" data-pos="${pos}">
          <option value="">-- selecionar --</option>
          ${teams.map(t=>`<option value="${t}" ${rr.groups[gId]?.[pos]===t?'selected':''}>${flag(t)} ${t}</option>`).join('')}
        </select>
      </div>`).join('');
  };

  const allTeams=Object.values(GROUPS).flatMap(g=>g.teams);
  const bracketMatchSelect=(round,idx,teams)=>{
    const winner=rr.bracket?.[round]?.[idx];
    return `<select class="admin-select" data-round="${round}" data-idx="${idx}">
      <option value="">-- selecionar --</option>
      ${teams.map(t=>`<option value="${t}" ${winner===t?'selected':''}>${flag(t)} ${t}</option>`).join('')}
    </select>`;
  };

  c.innerHTML=`
  <div class="section-header">
    <div class="section-title">⚙ Painel Admin</div>
    <button class="btn btn-dim" id="back-ranking" style="margin-left:auto">← Voltar ao Ranking</button>
  </div>
  <div class="admin-panel">
    <div class="admin-section-title">Resultados Reais — Fase de Grupos</div>
    <div class="admin-groups-grid">
      ${'ABCDEFGHIJKL'.split('').map(g=>`
        <div class="admin-group">
          <div class="admin-section-title" style="margin-top:0;font-size:.9rem">Grupo ${g}</div>
          ${groupSelects(g)}
        </div>`).join('')}
    </div>

    <div class="admin-section-title">Melhores 3ºs Classificados (selecione 8)</div>
    <div class="thirds-grid" id="admin-thirds">
      ${'ABCDEFGHIJKL'.split('').map(g=>{
        const team=rr.groups[g]?.third||GROUPS[g].teams[2];
        const sel=(rr.bestThirds||[]).includes(team);
        return `<div class="third-card ${sel?'selected':''}" data-team="${team}">
          <span>${flag(team)}</span><span style="font-size:.85rem">${team}</span>
        </div>`;
      }).join('')}
    </div>

    <div class="admin-section-title">Resultados do Mata-Mata</div>
    <div class="admin-bracket-grid">
      ${Array(16).fill(0).map((_,i)=>`<div class="admin-match">
        <label>16avos — Jogo ${i+1}</label>
        ${bracketMatchSelect('r32',i,allTeams)}
      </div>`).join('')}
      ${Array(8).fill(0).map((_,i)=>`<div class="admin-match">
        <label>Oitavas — Jogo ${i+1}</label>
        ${bracketMatchSelect('r16',i,allTeams)}
      </div>`).join('')}
      ${Array(4).fill(0).map((_,i)=>`<div class="admin-match">
        <label>Quartas — Jogo ${i+1}</label>
        ${bracketMatchSelect('qf',i,allTeams)}
      </div>`).join('')}
      ${Array(2).fill(0).map((_,i)=>`<div class="admin-match">
        <label>Semifinal — Jogo ${i+1}</label>
        ${bracketMatchSelect('sf',i,allTeams)}
      </div>`).join('')}
      <div class="admin-match">
        <label>CAMPEÃO</label>
        <select class="admin-select" data-round="champion" data-idx="0">
          <option value="">-- selecionar --</option>
          ${allTeams.map(t=>`<option value="${t}" ${rr.bracket?.champion===t?'selected':''}>${flag(t)} ${t}</option>`).join('')}
        </select>
      </div>
    </div>

    <div class="admin-section-title">Artilheiro Real</div>
    <select class="admin-select" id="admin-scorer" style="max-width:300px">
      <option value="">-- selecionar --</option>
      ${PLAYERS.map(p=>`<option value="${p.name}" ${rr.topScorer===p.name?'selected':''}>${flag(p.team)} ${p.name} (${p.team})</option>`).join('')}
    </select>

    <div class="admin-btn-row">
      <button class="btn btn-gold" id="admin-save">💾 SALVAR E RECALCULAR PONTOS</button>
      <button class="btn btn-red" id="admin-export">📥 EXPORTAR DADOS</button>
      <button class="btn btn-red" id="admin-reset-local">🗑️ LIMPAR MEUS DADOS LOCAIS</button>
    </div>

    <div class="admin-section-title">Gerenciar Participantes</div>
    <div style="margin-bottom:.75rem">
      <button class="btn btn-outline" id="admin-sync">🔄 Sincronizar do Firebase</button>
    </div>
    <div id="admin-participants">
      ${Object.keys(AppState.participants).map(name=>`
        <div style="display:flex;align-items:center;gap:.75rem;padding:.5rem;border-bottom:1px solid var(--border)">
          <span>${name}</span>
          <span style="color:var(--text-dim);font-size:.8rem">${AppState.participants[name].code}</span>
          <span style="color:var(--text-dim);font-size:.8rem">${AppState.participants[name].locked?'🔒 Travado':'✏️ Em progresso'}</span>
          <button class="btn btn-red" style="margin-left:auto;padding:.3rem .6rem;font-size:.75rem" data-del="${name}">Remover</button>
        </div>`).join('')}
    </div>
  </div>`;

  document.getElementById('back-ranking').onclick=()=>renderRanking();

  // Admin thirds selection
  const adminThirds=document.getElementById('admin-thirds');
  adminThirds.querySelectorAll('.third-card').forEach(c=>{
    c.addEventListener('click',()=>{
      const team=c.dataset.team;
      const list=AppState.realResults.bestThirds;
      const idx=list.indexOf(team);
      if(idx>=0) list.splice(idx,1);
      else if(list.length<8) list.push(team);
      c.classList.toggle('selected',list.includes(team));
    });
  });

  document.getElementById('admin-save').onclick=()=>{
    // Collect group results
    document.querySelectorAll('.admin-select[data-group]').forEach(sel=>{
      const g=sel.dataset.group, pos=sel.dataset.pos;
      if(!AppState.realResults.groups[g]) AppState.realResults.groups[g]={};
      AppState.realResults.groups[g][pos]=sel.value||null;
    });
    // Collect bracket
    if(!AppState.realResults.bracket) AppState.realResults.bracket={r32:[],r16:[],qf:[],sf:[],champion:''};
    ['r32','r16','qf','sf'].forEach(round=>{
      const sels=document.querySelectorAll(`.admin-select[data-round="${round}"]`);
      AppState.realResults.bracket[round]=Array.from(sels).map(s=>s.value||null);
    });
    const champSel=document.querySelector('.admin-select[data-round="champion"]');
    if(champSel) AppState.realResults.bracket.champion=champSel.value||'';
    AppState.realResults.topScorer=document.getElementById('admin-scorer').value||'';
    recalcAllScores();
    fbSaveRealResults().catch(e=>console.warn('fbSaveReal:',e));
    showToast('✅ Resultados salvos e pontuação recalculada!');
  };

  document.getElementById('admin-reset-local').onclick=()=>{
    if(!window.confirm('Apagar todos os palpites salvos neste navegador? Os dados no Firebase não serão afetados.')) return;
    localStorage.removeItem('bolao2026');
    AppState = {
      currentUser: null,
      participants: {},
      realResults: { groups:{}, bestThirds:[], bracket:{r32:[],r16:[],qf:[],sf:[],champion:''}, topScorer:'' },
      scores: {}
    };
    document.getElementById('app').style.display = 'none';
    document.getElementById('entry-overlay').style.display = 'flex';
    renderEntry();
  };

  document.getElementById('admin-export').onclick=()=>{
    const json=JSON.stringify(AppState,null,2);
    const blob=new Blob([json],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='bolao2026_dados.json';
    a.click();
  };

  document.getElementById('admin-sync')?.addEventListener('click',async()=>{
    showToast('⏳ Sincronizando...');
    try{
      const fbParts=await fbLoadParticipants();
      if(fbParts && Object.keys(fbParts).length){
        Object.assign(AppState.participants,fbParts);
        saveState();
        recalcAllScores();
        showToast(`✅ ${Object.keys(fbParts).length} participante(s) sincronizado(s)!`);
      } else {
        showToast('Nenhum dado no Firebase ainda.');
      }
    } catch(e){ showToast('Erro ao sincronizar: '+(e.message||'erro desconhecido')); }
    renderAdminPanel();
  });

  document.querySelectorAll('[data-del]').forEach(b=>{
    b.addEventListener('click',()=>{
      const name=b.dataset.del;
      if(!window.confirm(`Remover "${name}" do bolão?`)) return;
      const code=AppState.participants[name]?.code;
      delete AppState.participants[name];
      delete AppState.scores[name];
      if(AppState.currentUser===name) AppState.currentUser=null;
      saveState();
      if(code) fbDeleteParticipant(code).catch(e=>console.warn('fbDel:',e));
      renderAdminPanel();
      showToast(`${name} removido.`);
    });
  });
}
